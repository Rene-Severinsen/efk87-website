services:
  postgres:
    image: postgres:16
    container_name: efk87-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: efk87
      POSTGRES_PASSWORD: efk87_dev_password
      POSTGRES_DB: efk87_dev
    ports:
      - "5432:5432"
    volumes:
      - efk87_postgres_dev_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: efk87-mailpit-dev
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  efk87_postgres_dev_data: